<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>우리 가족 - 모바일 프리뷰</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, sans-serif;
  }
  .phone-frame {
    width: 375px;
    height: 812px;
    border-radius: 44px;
    border: 8px solid #2d2d2d;
    overflow: hidden;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 2px #444;
    background: #000;
  }
  .phone-frame::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 28px;
    background: #2d2d2d;
    border-radius: 0 0 16px 16px;
    z-index: 10;
  }
  .phone-frame iframe {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 36px;
  }
  h1 {
    position: fixed;
    top: 24px; left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 18px;
    font-weight: 300;
    opacity: 0.6;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
  <h1>우리 가족 앱 프리뷰</h1>
  <div class="phone-frame">
    <iframe src="http://localhost:8082"></iframe>
  </div>
</body>
</html>
